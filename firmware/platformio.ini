[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
extra_scripts = pre:tools/fetch_ca.py

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    esp32async/AsyncTCP@^3.3.2
    esp32async/ESPAsyncWebServer@^3.7.0
    ricmoo/QRCode@^0.0.1

# ---- Board targets ----

[env:s3box]
extends = common
build_flags = ${common.build_flags} -DBOARD_S3BOX=1

[env:s3box_lite]
extends = common
build_flags = ${common.build_flags} -DBOARD_S3BOX_LITE=1

[env:s3box3]
extends = common
build_flags = ${common.build_flags} -DBOARD_S3BOX_3=1
